name: Next.js Build & Deploy
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node 16 & Cache
        uses: actions/setup-node@v2
        with:
          node-version: "16"
          cache: "npm"

      - name: Dependencies Install
        run: npm install

      - name: Build
        run: npm run build

      - name: Export
        run: npm run export

      - name: Generate .nojekyll
        run: touch out/.nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@4.1.7
        with:
          brach: gh-pages
          folder: out
          git-config-name: Build-Deploy Bot
          git-config-email: <>
          commit-message: Generated by Next.js Build & Deploy
